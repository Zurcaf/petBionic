; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Keep default PlatformIO directories for cross-OS compatibility.

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
	bogde/HX711 @ ^0.7.5
	; BLE is native in ESP32 Arduino framework
	; SD is native in ESP32 Arduino framework
build_src_filter = +<*> -<diagnostic_main.cpp>

[env:seeed_xiao_esp32c3_diag]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
	bogde/HX711 @ ^0.7.5
	; BLE is native in ESP32 Arduino framework
	; SD is native in ESP32 Arduino framework
build_src_filter = +<*> -<main.cpp>
