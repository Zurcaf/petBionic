; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_esp32c3
extra_configs = secrets.ini

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_TASK_STACK_SIZE=8192
    -DCONFIG_NIMBLE_CPP_TASK_STACK_SIZE=8192
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DCONFIG_ESP_COEX_SW_COEXIST_ENABLE=1
    -DPETBIONICS_BLE_DEBUG=1
    -Os
    ${secrets.build_flags}
lib_deps =
    bogde/HX711 @ ^0.7.5
    h2zero/NimBLE-Arduino @ 2.3.6
    ; SD, WiFi, HTTPClient, WiFiClientSecure are bundled with ESP32 Arduino
build_src_filter = +<*> -<diagnostic_main.cpp>

[env:seeed_xiao_esp32c3_diag]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_TASK_STACK_SIZE=8192
    -DCONFIG_NIMBLE_CPP_TASK_STACK_SIZE=8192
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DCONFIG_ESP_COEX_SW_COEXIST_ENABLE=1
lib_deps =
    bogde/HX711 @ ^0.7.5
    h2zero/NimBLE-Arduino @ 2.3.6
build_src_filter = +<*> -<main.cpp>

[env:imu_orientation_debug]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_flags =
    --before=no_reset
    --after=hard_reset
build_src_filter = +<../test/test_imu_orientation/test_main.cpp>
